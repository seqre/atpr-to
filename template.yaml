AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: atpr.to — AT Protocol URL Shortener

Globals:
  Function:
    Timeout: 30
    MemorySize: 128
    Environment:
      Variables:
        RUST_LOG: info

Resources:
  AtprToFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: rust-cargolambda
    Properties:
      FunctionName: atpr-to
      CodeUri: .
      Handler: bootstrap
      Runtime: provided.al2023
      Architectures:
        - arm64
      Environment:
        Variables:
          ATPR_BASE_URL: "https://atpr.to"
          ATPR_SLINGSHOT_URL: !Sub "{{resolve:ssm:/atpr-to/slingshot-url}}"
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY
        Root:
          Type: HttpApi
          Properties:
            Path: /
            Method: ANY

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/"
