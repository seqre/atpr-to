<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>{% block title %}atpr.to{% endblock %}</title>
<meta property="og:site_name" content="atpr.to">
<meta property="og:type" content="website">
<meta property="og:title" content="{% block og_title %}atpr.to — AT Protocol URL Shortener{% endblock %}">
<meta property="og:description" content="{% block og_description %}AT Protocol URL shortener — links stored in your own PDS.{% endblock %}">
<meta property="og:image" content="https://atpr.to/static/logo.svg">
<script>
  (function(){var t=localStorage.getItem('theme');if(t)document.documentElement.dataset.theme=t;})();
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
<link rel="stylesheet" href="/static/app.css">
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
{% block head %}{% endblock %}
</head>
<body>
<main class="container">
{% block content %}{% endblock %}
</main>
<footer class="landing-footer">
  <small>made by <a href="https://bsky.app/profile/seqre.dev" target="_blank" rel="noopener">@seqre.dev</a></small>
</footer>
</body>
</html>
